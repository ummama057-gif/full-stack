<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TO DO App</title>
<style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    li { margin: 5px 0; }
    button { margin-left: 5px; }
</style>
</head>
<body>

<h1>TO DO App</h1>
<input type="text" id="inp" placeholder="Enter a task">
<button id="addBtn">Add</button>
<ul id="list"></ul>

<script>
let inputt = document.getElementById("inp");
let buton = document.getElementById("addBtn");
let list = document.getElementById("list");

// Update button
let updateBtn = document.createElement("button");
updateBtn.innerText = "Update";
updateBtn.style.display = "none";
document.body.insertBefore(updateBtn, list);

// GET all tasks
async function getData() {
    try {
        let res = await fetch("http://localhost:3210/getpost");
        let data = await res.json();
        list.innerHTML = "";

        data.forEach(item => {
            let li = document.createElement("li");

            // Checkbox
            let checkBox = document.createElement("input");
            checkBox.type = "checkbox";
            checkBox.checked = item.completed;

            // Task title
            let span = document.createElement("span");
            span.innerText = item.title;
            if(item.completed) span.style.textDecoration = "line-through";

            checkBox.onchange = async () => {
                await fetch(`http://localhost:3210/updatepost/${item._id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title: item.title, completed: checkBox.checked })
                });
                getData();
            }

            li.appendChild(checkBox);
            li.appendChild(span);

            // Edit button
            let editBtn = document.createElement("button");
            editBtn.innerText = "Edit";
            editBtn.onclick = () => {
                inputt.value = item.title;
                updateBtn.style.display = "inline";
                buton.style.display = "none";

                updateBtn.onclick = async () => {
                    if(inputt.value === "") {
                        alert("Task likho pehle!");
                        return;
                    }

                    await fetch(`http://localhost:3210/updatepost/${item._id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ title: inputt.value, completed: checkBox.checked })
                    });

                    inputt.value = "";
                    updateBtn.style.display = "none";
                    buton.style.display = "inline";
                    getData();
                };
            }

            // Delete button
            let delBtn = document.createElement("button");
            delBtn.innerText = "Delete";
            delBtn.onclick = async () => {
                await fetch(`http://localhost:3210/delete/${item._id}`, {
                    method: "DELETE"
                });
                getData();
            }

            li.appendChild(editBtn);
            li.appendChild(delBtn);
            list.appendChild(li);
        });
    } catch(err) {
        console.error("Error fetching tasks:", err);
    }
}

// Add new task
buton.onclick = async () => {
    if(inputt.value === "") {
        alert("Task likho pehle!");
        return;
    }

    try {
        await fetch("http://localhost:3210/todo", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: inputt.value })
        });

        inputt.value = "";
        getData();
    } catch(err) {
        console.error("Error adding task:", err);
    }
}

// Initial load
getData();
</script>

</body>
</html>
